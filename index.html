<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> Modern Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <h1>Sign In</h1>
    <form id="loginForm" novalidate>
      <div class="form-group">
        <input type="email" id="email" placeholder=" " required autocomplete="email">
        <label for="email">Email</label>
      </div>
      <div class="form-group password-wrapper">
        <input type="password" id="password" placeholder=" " required minlength="6">
        <label for="password">Password</label>
        <button type="button" class="toggle-password" id="togglePassword">👁️</button>
      </div>
      <div class="error-message" id="errorMsg"></div>
      <button type="submit" id="submitBtn">Log In</button>
    </form>
    <div class="links">
      <a href="#">Forgot password?</a> • <a href="#">Create account</a>
    </div>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('togglePassword');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    // Password visibility toggle
    toggleBtn.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      toggleBtn.textContent = type === 'password' ? '👁️' : '🙈';
    });
    // Real-time input validation (optional visual feedback)
    emailInput.addEventListener('input', () => {
      emailInput.style.borderColor = emailInput.validity.valid ? '' : '#f87171';
    });
    passwordInput.addEventListener('input', () => {
      passwordInput.style.borderColor = passwordInput.validity.valid ? '' : '#f87171';
    });
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('show');
      errorMsg.textContent = '';
      if (!form.checkValidity()) {
        errorMsg.textContent = 'Please fill in all fields correctly.';
        errorMsg.classList.add('show');
        form.classList.add('shake');
        setTimeout(() => form.classList.remove('shake'), 600);
        return;
      }
      // Simulate API call / loading state
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');
      submitBtn.textContent = '';
      try {
        // ← Replace this with real fetch/axios call
        await new Promise(resolve => setTimeout(resolve, 1600));
        // Success simulation
        errorMsg.style.color = '#86efac';
        errorMsg.textContent = 'Login successful!';
        errorMsg.classList.add('show');
        setTimeout(() => {
          // window.location.href = '/dashboard';
          alert('Welcomee user!');
          submitBtn.disabled = false;
          submitBtn.classList.remove('loading');
          submitBtn.textContent = 'Log In';
        }, 1200);
      } catch (err) {
        errorMsg.textContent = 'Invalid email or password.';
        errorMsg.classList.add('show');
        form.classList.add('shake');
        setTimeout(() => form.classList.remove('shake'), 600);
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
        submitBtn.textContent = 'Log In';
      }
    });
  </script>
</body>
</html>
